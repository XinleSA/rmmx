#  Last Modified: March 11, 2025
# =============================================================================
#
#  PREREQUISITES:
#    Copy .env.example to .env and fill in all values before starting:
#      cp .env.example .env
#
#  To start all services:  docker compose up -d
#  To stop all services:   docker compose down
#  To update all images:   ./scripts/02_update_images.sh
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  #  1. Nginx Proxy Manager (NPM)
  #     - Handles all public-facing SSL and routing.
  #     - Accessible at http://<vps_ip>:81 for initial setup.
  #     - Final URL: https://rmmx.xinle.biz/npm
  # ---------------------------------------------------------------------------
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: npm
    restart: unless-stopped
    ports:
      - '80:80'   # Public HTTP
      - '443:443' # Public HTTPS
      - '81:81'   # NPM Admin UI
    volumes:
      - /docker_apps/npm/data:/data
      - /docker_apps/npm/letsencrypt:/etc/letsencrypt
      - /storage:/storage:ro
    networks:
      - xinle_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  #  2. n8n — Workflow Automation
  #     - Final URL: https://rmmx.xinle.biz/n8n
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    volumes:
      - /docker_apps/n8n:/home/node/.n8n
      - /storage:/storage:ro
    networks:
      - xinle_network
    environment:
      - N8N_HOST=rmmx.xinle.biz
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://rmmx.xinle.biz/n8n/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  #  3. Forgejo — Self-Hosted Git Service
  #     - Final URL: https://rmmx.xinle.biz/git
  # ---------------------------------------------------------------------------
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forgejo
    restart: unless-stopped
    volumes:
      - /docker_apps/forgejo:/data
      - /storage:/storage:ro
    networks:
      - xinle_network
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgres:5432
      - FORGEJO__database__NAME=${FORGEJO_DB:-forgejo}
      - FORGEJO__database__USER=${POSTGRES_USER}
      - FORGEJO__database__PASSWD=${POSTGRES_PASSWORD}
      - FORGEJO__server__ROOT_URL=https://rmmx.xinle.biz/git
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  #  4. NetLock RMM — Remote Monitoring & Management
  #     - Final URL: https://rmmx.xinle.biz/rmm
  # ---------------------------------------------------------------------------
  netlockrmm-server:
    image: nicomak101/netlock-rmm-server:latest
    container_name: netlockrmm-server
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
      - NETLOCK_MYSQL_SERVER=mysql
      - NETLOCK_MYSQL_PORT=3306
      - NETLOCK_MYSQL_DATABASE=netlockrmm
      - NETLOCK_MYSQL_USER=sar
      - NETLOCK_MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - /docker_apps/netlockrmm/server/appsettings.json:/app/appsettings.json:ro
      - /docker_apps/netlockrmm/server/internal:/app/internal
      - /docker_apps/netlockrmm/server/files:/app/www/private/files
      - /docker_apps/netlockrmm/server/logs:/var/log/netlockrmm
      - /storage:/storage:ro
    networks:
      - xinle_network
    depends_on:
      mysql:
        condition: service_healthy

  netlockrmm-web:
    image: nicomak101/netlock-rmm-web-console:latest
    container_name: netlockrmm-web
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    volumes:
      - /docker_apps/netlockrmm/web/appsettings.json:/app/appsettings.json:ro
      - /storage:/storage:ro
    networks:
      - xinle_network
    depends_on:
      - netlockrmm-server

  # ---------------------------------------------------------------------------
  #  5. Databases & Database Admin Tools
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    volumes:
      - /docker_apps/postgres:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
      - /storage:/storage:ro
    networks:
      - xinle_network
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-xinle_db}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-xinle_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    user: "5050:5050"
    volumes:
      - /docker_apps/pgadmin:/var/lib/pgadmin
      - /storage:/storage:ro
    networks:
      - xinle_network
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@xinle.biz
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=False
    depends_on:
      postgres:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    command: --mysql-native-password=ON
    volumes:
      - /docker_apps/mysql:/var/lib/mysql
      - /storage:/storage:ro
    networks:
      - xinle_network
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=netlockrmm
      - MYSQL_USER=sar
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sar", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    networks:
      - xinle_network
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - /storage:/storage:ro
    depends_on:
      mysql:
        condition: service_healthy

# =============================================================================
#  Networks & Volumes
# =============================================================================
networks:
  xinle_network:
    name: xinle_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
